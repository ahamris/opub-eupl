services:
  typesense:
    image: typesense/typesense:27.0
    container_name: openoverheid-typesense
    ports:
      - "8108:8108"
      - "8107:8107"
    volumes:
      - typesense-data:/data
    command: "--data-dir /data --api-key=${TYPESENSE_API_KEY} --enable-cors"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8108/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - openoverheid-network

  redis:
    image: redis:7-alpine
    container_name: openoverheid-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - openoverheid-network

networks:
  openoverheid-network:
    driver: bridge

volumes:
  typesense-data:
    driver: local
  redis-data:
    driver: local

